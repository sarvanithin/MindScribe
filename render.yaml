services:
  - type: web
    name: mindscribe-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false   # set manually in Render dashboard
      - key: DEMO_MODE
        value: false
